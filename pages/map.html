<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>GeoFlood Map</title>


    <!-- Leaflet CSS -->
    <link rel="stylesheet" 
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>


    <!-- External CSS -->
    <link rel="stylesheet" href="../css/style.css">



    <style>


        body {

            margin:0;

            font-family:Arial, sans-serif;

        }



        /* ======================
           NAVBAR
        ====================== */


        .navbar {


            display:grid;

            grid-template-columns:1fr auto 1fr;

            align-items:center;

            background:#1e2a38;

            padding:10px 20px;


        }



        .logo {


            color:white;

            margin:0;

            justify-self:start;


        }




        .menu {


            list-style:none;

            display:flex;

            gap:20px;

            justify-self:center;

            margin:0;

            padding:0;


        }





        .menu a {


            color:white;

            text-decoration:none;

            font-weight:bold;


        }





        .menu a:hover {


            color:#00c3ff;


        }





        /* ======================
           HEADER
        ====================== */


        .header {


            text-align:center;

            background:#2c3e50;

            color:white;

            padding:10px;

            font-size:20px;

            font-weight:bold;


        }







        /* ======================
           MAP
        ====================== */


        #map {


            height:calc(100vh - 100px);

            position:relative;


        }





        /* ======================
           NORTH ARROW
        ====================== */


        .north-arrow {


            position:absolute;


            top:20px;


            right:25px;


            width:70px;


            height:auto;


            z-index:1000;


        }




    </style>



</head>



<body>



<!-- ======================
     NAVIGATION BAR
====================== -->


<nav class="navbar">


    <h2 class="logo">
        🌊 GeoFlood
    </h2>



    <ul class="menu">


        <li>
            <a href="../index.html">
                Home
            </a>
        </li>


        <li>
            <a href="news.html">
                News
            </a>
        </li>


        <li>
            <a href="world.html">
                World
            </a>
        </li>


        <li>
            <a href="analysis.html">
                Analysis
            </a>
        </li>


        <li>
            <a href="map.html">
                Map
            </a>
        </li>


        <li>
            <a href="recommendation.html">
                Recommendation
            </a>
        </li>


        <li>
            <a href="about.html">
                About
            </a>
        </li>


    </ul>


</nav>






<!-- ======================
     HEADER
====================== -->


<div class="header">

    Selangor Flood Risk Map

</div>






<!-- ======================
     MAP
====================== -->


<div id="map">


    <!-- NORTH ARROW IMAGE -->

    <img 
    src="../data/North_Arrow.png"
    class="north-arrow">


</div>








<!-- Leaflet JS -->


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>




<!-- Flood Map Script -->


<script src="../js/script.js"></script>




</body>


</html>
